name: Build AppImage

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build AppImage
        run: npm run pack-linux

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Linux-AppImage
          path: release/*.AppImage
